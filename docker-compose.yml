version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///learning_copilot.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend/app/uploads:/app/uploads
      - ./backend/app/chroma_db:/app/chroma_db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always
